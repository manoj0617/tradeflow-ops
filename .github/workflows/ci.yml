name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tradeflow_test
          POSTGRES_USER: tradeflow
          POSTGRES_PASSWORD: tradeflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tradeflow -d tradeflow_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://tradeflow:tradeflow@localhost:5432/tradeflow_test?schema=public
      TEST_DATABASE_URL: postgresql://tradeflow:tradeflow@localhost:5432/tradeflow_test?schema=public
      JWT_SECRET: ci-secret-that-is-longer-than-thirty-two-characters
      CORS_ORIGIN: http://localhost:5173
      SEED_PASSWORD: TradeFlow@123
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run db:generate
      - run: npm run db:deploy
      - run: npm run db:seed
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run lint
      - run: npm run test
      - run: npm run build

