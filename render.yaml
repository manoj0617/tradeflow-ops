services:
  - type: web
    name: tradeflow-ops-api
    runtime: node
    plan: free
    region: singapore
    rootDir: backend
    autoDeploy: true
    buildCommand: npm ci --no-audit --no-fund && npm run db:generate && npm run build && npm run db:deploy && npm run db:seed
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 2h
      - key: CORS_ORIGIN
        sync: false
      - key: SEED_PASSWORD
        sync: false
