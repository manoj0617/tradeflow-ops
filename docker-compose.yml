services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tradeflow
      POSTGRES_USER: tradeflow
      POSTGRES_PASSWORD: tradeflow
    ports:
      - "5432:5432"
    volumes:
      - tradeflow_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradeflow -d tradeflow"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tradeflow_postgres:

